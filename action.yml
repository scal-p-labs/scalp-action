name: 'SCAL-P CI'
description: 'Secure Chain Assurance Layer for Packages - enforce policy, hash dependencies, and audit your JavaScript project in CI'
author: 'scal-p-labs'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  version:
    description: 'Version of SCAL-P to use (e.g., v0.1.0, or "latest" for the latest release)'
    required: false
    default: 'latest'

  pm:
    description: 'Package manager (npm, pnpm, yarn, bun). Auto-detected from lockfile if not set.'
    required: false
    default: ''

  policy:
    description: 'Path to the policy file relative to working-directory'
    required: false
    default: '.scalp/policy.json'

  output:
    description: 'Path for the CI report output relative to working-directory'
    required: false
    default: '.scalp/ci-report.json'

  pr-context:
    description: 'PR context (fork or internal)'
    required: false
    default: 'fork'

  allow-scripts:
    description: 'Allow install scripts to run (internal PRs only)'
    required: false
    default: 'false'

  sarif:
    description: 'Path for the SARIF report output relative to working-directory'
    required: false
    default: ''

  working-directory:
    description: 'Working directory relative to the repository root'
    required: false
    default: '.'

  enforcement:
    description: 'Enforcement mode for violations (block, warn, or log)'
    required: false
    default: 'block'

  checksum:
    description: 'Expected SHA-512 checksum for the lockfile (format: sha512-<base64>)'
    required: false
    default: ''

  debug:
    description: 'Enable debug-level logging'
    required: false
    default: 'false'

outputs:
  status:
    description: 'CI run status (pass or fail)'
    value: ${{ steps.run-ci.outputs.status }}
  report-path:
    description: 'Path to the generated CI report'
    value: ${{ steps.run-ci.outputs.report-path }}
  sarif-path:
    description: 'Path to the generated SARIF report'
    value: ${{ steps.run-ci.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Install SCAL-P
      shell: bash
      run: ${{ github.action_path }}/scripts/install-scalp.sh ${{ inputs.version }}
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Run scalp ci
      id: run-ci
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SCALP_PM: ${{ inputs.pm }}
        SCALP_POLICY: ${{ inputs.policy }}
        SCALP_OUTPUT: ${{ inputs.output }}
        SCALP_PR_CONTEXT: ${{ inputs.pr-context }}
        SCALP_ALLOW_SCRIPTS: ${{ inputs.allow-scripts }}
        SCALP_SARIF: ${{ inputs.sarif }}
        SCALP_ENFORCEMENT: ${{ inputs.enforcement }}
        SCALP_CHECKSUM: ${{ inputs.checksum }}
        SCALP_DEBUG: ${{ inputs.debug }}
      run: |
        ADDITIONAL_ARGS=()

        if [ -n "$SCALP_PM" ]; then
          ADDITIONAL_ARGS+=(--pm "$SCALP_PM")
        fi

        if [ "$SCALP_ALLOW_SCRIPTS" = "true" ]; then
          ADDITIONAL_ARGS+=(--allow-scripts)
        fi

        if [ -n "$SCALP_SARIF" ]; then
          ADDITIONAL_ARGS+=(--sarif "$SCALP_SARIF")
        fi

        if [ -n "$SCALP_ENFORCEMENT" ]; then
          ADDITIONAL_ARGS+=(--enforcement "$SCALP_ENFORCEMENT")
        fi

        if [ -n "$SCALP_CHECKSUM" ]; then
          ADDITIONAL_ARGS+=(--checksum "$SCALP_CHECKSUM")
        fi

        if [ "$SCALP_DEBUG" = "true" ]; then
          ADDITIONAL_ARGS+=(--debug)
        fi

        echo "Running: scalp ci --policy \"$SCALP_POLICY\" --output \"$SCALP_OUTPUT\" --pr-context $SCALP_PR_CONTEXT${SCALP_SARIF:+ --sarif \"$SCALP_SARIF\"}${SCALP_ENFORCEMENT:+ --enforcement \"$SCALP_ENFORCEMENT\"}${SCALP_CHECKSUM:+ --checksum \"$SCALP_CHECKSUM\"}${SCALP_DEBUG:+ --debug}"

        resolve_abs() {
          case "$1" in
            /*) echo "$1" ;;
            *) echo "$(pwd)/$1" ;;
          esac
        }

        ABS_OUTPUT=$(resolve_abs "$SCALP_OUTPUT")
        ABS_SARIF=""
        if [ -n "$SCALP_SARIF" ]; then
          ABS_SARIF=$(resolve_abs "$SCALP_SARIF")
        fi

        if scalp ci \
          --policy "$SCALP_POLICY" \
          --output "$SCALP_OUTPUT" \
          --pr-context "$SCALP_PR_CONTEXT" \
          "${ADDITIONAL_ARGS[@]}"; then
          echo "status=pass" >> "$GITHUB_OUTPUT"
          echo "report-path=$ABS_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "sarif-path=$ABS_SARIF" >> "$GITHUB_OUTPUT"
        else
          echo "status=fail" >> "$GITHUB_OUTPUT"
          echo "report-path=$ABS_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "sarif-path=$ABS_SARIF" >> "$GITHUB_OUTPUT"
          exit 1
        fi
