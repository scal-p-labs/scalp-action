name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate action.yml
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"
      - name: Shellcheck install script
        run: shellcheck scripts/install-scalp.sh

  integration:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: scalp-action
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: scal-p-labs/SCAL-P
          path: SCAL-P
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Build scalp from source
        working-directory: SCAL-P
        run: make build
      - name: Install scalp binary to PATH
        run: cp SCAL-P/.bin/scal-p /usr/local/bin/scalp
      - name: Generate lockfile
        working-directory: scalp-action/test/fixture
        run: npm install --package-lock-only
      - name: Run scalp ci on test fixture
        working-directory: scalp-action/test/fixture
        run: scalp ci --pr-context internal --policy .scalp/policy.json --output .scalp/ci-report.json
