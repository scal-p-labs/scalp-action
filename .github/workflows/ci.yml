name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate action.yml
        run: python3 -c "import yaml; yaml.safe_load(open('action.yml'))"
      - name: Shellcheck install script
        run: shellcheck scripts/install-scalp.sh

  integration:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: scalp-action
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: scal-p-labs/SCAL-P
          path: SCAL-P
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
      - name: Build scalp from source
        working-directory: SCAL-P
        run: make build
      - name: Install scalp binary to PATH
        run: cp SCAL-P/.bin/scal-p /usr/local/bin/scalp
      - name: Generate lockfile
        working-directory: scalp-action/test/fixture
        run: npm install --package-lock-only
      - name: Run scalp ci on test fixture
        working-directory: scalp-action/test/fixture
        run: |
          scalp ci \
            --pr-context internal \
            --policy .scalp/policy.json \
            --output .scalp/ci-report.json \
            --sarif .scalp/scalp-report.sarif
      - name: Upload SARIF to Code Scanning
        if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: scalp-action/test/fixture/.scalp/scalp-report.sarif
      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scalp-reports
          path: |
            scalp-action/test/fixture/.scalp/ci-report.json
            scalp-action/test/fixture/.scalp/scalp-report.sarif
